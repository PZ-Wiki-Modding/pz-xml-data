name: Format Script Blocks

on:
  push:
    branches: [main, dev]
    paths:
      - 'data/**'
      - 'chores/**'
      - '.github/workflows/format-output.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'data/**'
      - 'chores/**'
      - '.github/workflows/format-output.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          
      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Generate output
        run: python chores/generate_output.py
      - name: Format schemas
        run: python chores/format_schemas.py
      - name: Make settings
        run: python chores/make_settings.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add out/scriptBlocks.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "CHORE: format output" && git push)
