# yaml-language-server: $schema: ../.schemas/data_schema.json

description: |-
  The AnimNode files are used to link animation files to the game by defining different parameters for the animation. This will notably control the speed of the animation, its blending with animations played before and after, events that need to be triggered and conditions that control when that animation can be played.
patterns:
- '**/AnimSets/**/*.xml'
root:
  name: animNode
  type: type_AnimNode
types:

# ROOT TYPE
  type_AnimNode:
    type: complex
    composition: choice
    elements:
    - name: m_Name
      metadata:
        type: xs:string
        minOccurs: 1
        maxOccurs: 1
      description: |-
        A unique identifier for this animation node. For example: "LoadRiffle", "Walk" etc. This is notably used to reference this animNode in other animNodes.
    - name: m_AnimName
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
      description: |-
        Name of the animation clip to play. This is the name of the animation file without the extension. The animation clip needs to be stored inside the `anims_X` folder and inside a subfolder which matches the character the animation is for. For the player, that subfolder needs to be `Bob`.

        For example, take the animation file `Bob_Reload_Rifle_Load.glb` with the following folder structure:
        ```
        📁 media
          📁 anims_X
            📁 Bob
              📄 Bob_Reload_Rifle_Load.glb
        ```

        To reference it in the animNode, you would use:
        ```xml
        <m_AnimName>Bob_Reload_Rifle_Load</m_AnimName>
        ```
    - name: m_BlendTime
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
      description: |-
        Defines how quickly the animation will begin to play, and how the game interpolates moving the armature's bones from one animNode to another. 
    - name: m_BlendOutTime
      metadata: 
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
      description: |-
        Defines how quickly the animation will end, and how the game interpolates moving the armature's bones from one animState to another. It is used to create a smooth transition when the animation is stopped or changed.
    - name: m_SpeedScale
      metadata:
        type:
          - xs:float
          - xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_SpeedScaleRandomMultiplierMin
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_SpeedScaleRandomMultiplierMax
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_TrackTimeToVariable
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_Looped
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
      description: |-
        Defines whether the animation will loop or not. If set to true, the animation will loop indefinitely until it is manually stopped or [conditions](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/animNode.html#m-conditions) are no longer met.
    - name: m_AnimReverse
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_Priority
      metadata:
        type: xs:integer
        minOccurs: 0
        maxOccurs: 1
      description: |-
        In cases of two animations that are playing at the same time, dictates which animation's bone weights or keyframes will take precedence. An example would be an idle animMask holding a glass which transitions into a drinking animation. The drinking animation takes priority over the idle drink-holding ainmMask if its priority is higher than the idle animation mask's XML. The priority value is an integer starting at 1 with high numbers taking the priority.
    - name: m_ConditionPriority
      metadata:
        type: xs:integer
        minOccurs: 0
        maxOccurs: 1
    - name: m_maxTorsoTwist
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_Scalar
      metadata:
        type:
          - xs:float
          - xs:string
        minOccurs: 0
    - name: m_Scalar2
      metadata:
        type:
          - xs:float
          - xs:string
        minOccurs: 0
    - name: m_SyncTrackingEnabled
      metadata:
        type: xs:boolean
        minOccurs: 0
    - name: m_2DBlends
      metadata:
        type: type_2DBlends
        minOccurs: 0
        maxOccurs: unbounded
    - name: m_2DBlendTri
      metadata:
        type: type_2DBlendTri
        minOccurs: 0
        maxOccurs: unbounded
    - name: m_Conditions
      metadata:
        type: type_Condition
        minOccurs: 0
        maxOccurs: unbounded
      description: |-
        Used to specify conditions that will allow an animation node to be chosen. If the conditions are not met, the node will not be chosen. These are often combined with the function [setVariable](https://demiurgequantified.github.io/ProjectZomboidJavaDocs/zombie/characters/IsoGameCharacter.html#setVariable(java.lang.String,java.lang.String)) (which exists in many forms) to set a specific condition.

        This can notably be used to trigger an animation by setting that condition to be valid, which will make the animation node eligible to be chosen by the game, as long as other conditions are also met.

        The syntax is as follows for the most common cases:
        ```xml
        <m_Conditions>
          <m_Name>VariableName</m_Name>
          <m_Type>STRING</m_Type>
          <m_Value>value</m_Value>
        </m_Conditions>
        ```

        In the following example, the variable `WeaponReloadType` is set by the game, using the parameter of the same name in the [item script](https://pz-wiki-modding.github.io/PZ-API-Docs/scripts/item.html#item-weaponreloadtype):
        ```xml
        <m_Conditions>
            <m_Name>WeaponReloadType</m_Name>
            <m_Type>STRING</m_Type>
            <m_Value>revolver</m_Value>
        </m_Conditions>
        ```
    - name: m_Events
      metadata:
        type: type_Events
        minOccurs: 0
        maxOccurs: unbounded
      description: |-
        Used to trigger different events during the animation at specific moments. This can be used to play sounds, set variables, and more. You can find a list of available events [here](https://pzwiki.net/wiki/Events#Available_events).
    - name: m_Transitions
      metadata:
        type: type_Transitions
        minOccurs: 0
        maxOccurs: unbounded
    - name: m_EarlyTransitionOut
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_StopAnimOnExit
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_SubStateBoneWeights
      metadata:
        type: type_SubStateBoneWeights
        minOccurs: 0
        maxOccurs: unbounded
      description: |-
        Used to define the weight of a bone and its keyframes or descendants. By default, all bones that are not defined with this parameter have a default weight of `1`. If you wanted to make it so an animation were to only play a specific set of bones; you would define the Dummy01 or the Bip01 bones (the parent armature bones) to have a weight of 0, and then specifically define all the bones you wish to play to have a weight value greater than 0.
    - name: m_DeferredBoneName
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_deferredBoneAxis
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_useDeferedRotation
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_MatchingGrappledAnimNode
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_GrappleOffsetForward
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_GrappleOffsetYaw
      metadata:
        type: xs:integer
        minOccurs: 0
        maxOccurs: 1
    - name: m_GrapplerOffsetBehaviour
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_GrappleTweenInTime
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    attributes:
    - name: x_extends
      metadata:
        type: xs:string
        use: optional
      description: |-
        Import another relative animNode file into this one. Needs to be the file name so for the following example folder structure: 
        ```
        📁 media
          📁 AnimSets
            📁 Rifle
              📄 LoadRifle.xml
              📄 LoadRifle_Alt.xml
        ``` 

        The LoadRifle_Alt.xml file can import the LoadRifle.xml file by using:
        ```xml
        <animNode x_extends="LoadRifle.xml"></animNode>
        ```

# 2D BLENDS TYPE
  type_2DBlends:
    type: complex
    elements:
    - name: m_AnimName
      metadata:
        type: xs:string
        minOccurs: 0
    - name: m_XPos
      metadata:
        type: xs:float
        minOccurs: 0
    - name: m_YPos
      metadata:
        type: xs:float
        minOccurs: 0
    - name: m_SpeedScale
      metadata:
        type: xs:float
        minOccurs: 0
    attributes:
    - name: referenceID
      metadata:
        type: xs:integer
        use: optional

# 2D BLEND TRI TYPE
  type_2DBlendTri:
    type: complex
    elements:
    - name: node1
      metadata:
        type: xs:integer
        minOccurs: 0
    - name: node2
      metadata:
        type: xs:integer
        minOccurs: 0
    - name: node3
      metadata:
        type: xs:integer
        minOccurs: 0

# CONDITION TYPE
  type_Condition:
    type: complex
    elements:
    - name: m_Name
      metadata:
        type: xs:string
        minOccurs: 0
    - name: m_Type
      metadata:
        type: enum_Type
        minOccurs: 0
    - name: m_Condition
      metadata:
        type: xs:string
        minOccurs: 0
    - name: m_Value
      metadata:
        type: xs:string
        minOccurs: 0
    attributes:
    - name: x_name
      metadata:
        type: xs:string
        use: optional
      description: |-
        This is unused by the game but it seems to be a simple identifier (often a [GUID](https://pzwiki.net/wiki/GUID)) used by the unreleased [AnimZed](https://pzwiki.net/wiki/AnimZed).

# EVENTS TYPE
  type_Events:
    type: complex
    elements:
    - name: m_EventName
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
      description: |-
        The name of the event to trigger. This can be a custom name but there's also available events that will trigger specific actions. You can find a list of available events [here](https://pzwiki.net/wiki/Events#Available_events).
    - name: m_Time
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
      description: |-
        The moment during the animation when the event will be triggered. This can be set to Start or End. 
    - name: m_TimePc
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
      description: |-
        The moment during the animation when the event will be triggered. This uses a normalized time, so `0` is the start and `1` is the end. In comparison to `m_Time`, this allows for more precision of when to trigger the event.
    - name: m_ParameterValue
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
      description: |-
        The value to pass to the event when it is triggered. This can be used to specify which sound to play, which variable to set, and more, depending on the event being triggered. 
    attributes:
    - name: x_name
      metadata:
        type: xs:string
        use: optional
      "#desc": type_Condition/attributes/x_name

# TRANSITIONS TYPE
  type_Transitions:
    type: complex
    composition: choice
    elements:
    - name: m_Target
      metadata:
        type: xs:string
        minOccurs: 0
      description: |-
        The name of the target animNode to transition to. This is the value of the `m_Name` field in the target animNode.
    - name: m_AnimName
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: m_blendInTime
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_blendOutTime
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_speedScale
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1
    - name: m_Conditions
      metadata:
        type: type_Condition
        minOccurs: 0
        maxOccurs: unbounded

# SUB STATE BONE WEIGHTS TYPE
  type_SubStateBoneWeights:
    type: complex
    elements:
    - name: boneName
      metadata:
        type: xs:string
        minOccurs: 0
        maxOccurs: 1
    - name: includeDescendants
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: weight
      metadata:
        type: xs:float
        minOccurs: 0
        maxOccurs: 1



# CONDITION TYPE ENUM
  enum_Type:
    type: simple
    restrictions:
      base: xs:string
      enumeration:
      - metadata:
          value: "STRING"
      - metadata:
          value: "BOOL"
      - metadata:
          value: "INT"
      - metadata:
          value: "FLOAT"
      - metadata:
          value: "OR"
      - metadata:
          value: "EQU"
      - metadata:
          value: "NEQ"
      - metadata:
          value: "STRNEQ"
      - metadata:
          value: "GTR"
      - metadata:
          value: "LESS"