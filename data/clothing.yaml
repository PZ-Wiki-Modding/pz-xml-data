# yaml-language-server: $schema: ../.schemas/data_schema.json

description: |-
  Define outfits for the male and female characters that can be used on zombies or the player. Items are provided with a probability value to define how likely they are to appear in the outfit.

  The file should be stored at the exact path `media/clothing/clothing.xml` and won't clash with other mods or the vanilla game file. The syntax of this file should be as follows:
  ```xml
  <?xml version="1.0" encoding="utf-8"?>
  <outfitManager>
    <m_FemaleOutfits>
      <m_Name>MyOutfit</m_Name>
      <m_Guid>my-outfit-guid</m_Guid>
      <m_items>
        <item>
          <probability>0.5</probability>
          <itemGUID>my-clothing-item-guid</itemGUID>
        </item>
        <item>
          <probability>0.5</probability>
          <itemGUID>my-other-clothing-item-guid</itemGUID>
          <subItems>
            <subItem>
              <itemGUID>my-sub-clothing-item-guid</itemGUID>
            </subItem>
          </subItems>
        </item>
      </m_items>
    </m_MaleOutfits>
      <m_Name>MyOutfit</m_Name>
      <m_Guid>my-outfit-guid</m_Guid>
      <m_items>
        <item>
          <probability>0.5</probability>
          <itemGUID>my-clothing-item-guid</itemGUID>
        </item>
        <item>
          <probability>0.5</probability>
          <itemGUID>my-other-clothing-item-guid</itemGUID>
          <subItems>
            <subItem>
              <itemGUID>my-sub-clothing-item-guid</itemGUID>
            </subItem>
          </subItems>
        </item>
      </m_items>
    </m_MaleOutfits>
  </outfitManager>
  ```
patterns:
  - '**/clothing/clothing.xml'
root:
  name: outfitManager
  type: type_clothing
types:

# ROOT TYPE
  type_clothing:
    type: complex
    composition: choice
    elements:
    - name: m_FemaleOutfits
      metadata:
        type: type_outfit
      description: |-
        Define an outfit with [m_FemaleOutfits](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-femaleoutfits) and [m_MaleOutfits](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-maleoutfits) respectively for the female and male characters. If one of the two is not defined, it won't spawn naturally on the other gender in the game. Both male and female outfits can (and probably should) keep the same [m_Name](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-name) and [m_Guid](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-guid) values.
    - name: m_MaleOutfits
      metadata:
        type: type_outfit
      "#desc": type_clothing/elements/m_FemaleOutfits
  
  type_outfit:
    type: complex
    composition: choice
    elements:
    - name: m_Name
      metadata:
        type: xs:string
        minOccurs: 1
        maxOccurs: 1
      description: |-
        The unique identifier for the outfit. Preferably keep it the same for the male and female variants.
    - name: m_Guid
      metadata:
        type: xs:string
        minOccurs: 1
        maxOccurs: 1
      description: |-
        The [GUID](https://pzwiki.net/wiki/GUID) of the outfit. This is the GUID associated to the clothing in the [fileGuidTable](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/fileGuidTable.html#guid) and [clothingItem](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothingItem.html#m-guid) files.

        To use a vanilla clothing item in your outfit, you need to redefine it in your own mod's fileGuidTable.xml file, otherwise the game will not recognize it.
    - name: m_Top
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
      description: |-
        If set to `true`, the outfit will spawn with random pants or shirts, respectivement for the parameters [m_Pants](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-pants) and [m_Top](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-top). When those two parameters are not set, they default to `true`.
    - name: m_Pants
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_AllowPantsHue
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_AllowTopTint
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_AllowPantsTint
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_AllowTShirtDecal
      metadata:
        type: xs:boolean
        minOccurs: 0
        maxOccurs: 1
    - name: m_items
      metadata:
        type: type_item
        minOccurs: 1
        maxOccurs: unbounded
  
  
  type_item:
    type: complex
    composition: choice
    elements:
    - name: probability
      metadata:
        type: xs:float
        minOccurs: 1
        maxOccurs: 1
      description: |-
        The probability of the item being selected for the outfit. Needs to be a value between 0.0 and 1.0.
    - name: itemGUID
      metadata:
        type: xs:string
        minOccurs: 1
        maxOccurs: 1
      description: |-
        The [GUID](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothingItem.html#m-guid) of the clothing item that should be part of the outfit. You can define extra outfits thanks to the [subItems](https://pz-wiki-modding.github.io/PZ-API-Docs/xml/clothing.html#m-subitems) parameter.
    - name: subItems
      metadata:
        type: type_subItem
        minOccurs: 0
        maxOccurs: unbounded
      description: |-
        Define a sub-item for a specific clothing item used in the outfit, so other items can also be picked.
  
  type_subItem:
    type: complex
    composition: choice
    elements:
    - name: itemGUID
      metadata:
        type: xs:string
        minOccurs: 1
        maxOccurs: 1
      "#desc": type_item/elements/itemGUID